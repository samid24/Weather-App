<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App | Check Live Weather by City</title>

    <meta name="description"
        content="Check live weather updates for any city. Fast, simple and responsive weather app with real-time temperature, humidity and conditions.">

    <meta name="keywords" content="weather app, live weather, check weather online, weather by city">
    <meta name="author" content="Samid Shaikh">
    <link rel="canonical" href="https://weather-app-samid.vercel.app/">
    <meta property="og:title" content="Live Weather App">
    <meta property="og:description" content="Check real-time weather updates for any city instantly.">
    <meta property="og:image" content="https://weather-app-samid.vercel.app/preview.png">
    <meta property="og:url" content="https://weather-app-samid.vercel.app/">
    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Live Weather App">
    <meta name="twitter:description" content="Check weather by city instantly.">
    <meta name="twitter:image" content="https://weather-app-samid.vercel.app/preview.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <div class="container">
            <div class="left common">
                <div class="search">
                    <input type="text" name="search" id="searchTerm" class="searchbox">
                    <button type="submit" class="searchIcon" id="searchBtn"><img src="images/search.png"
                            alt="search"></button>
                </div>
                <div class="weatherIcon">
                    <img decoding="async" id="weatherIcn" loading="lazy" src="" alt="forecaste image" draggable="false">
                </div>
                <div class="temperature">
                    <h2 id="tempC" class="temp"></h2><span class="gray">&deg;C</span>
                </div>
                <div class="cloudy">
                    <p id="cloud">Mostly Cloudy</p>
                </div>
                <div class="seperator">
                    <hr>
                </div>
                <div class="location">
                    <p id="currLocation"></p>
                </div>
            </div>
            <div class="right common">
                <div class="boxContainer">
                    <div class="box">
                        <p class="title">Wind</p>
                        <p class="mainContent" id="windSpeed"></p>
                    </div>
                    <div class="box">
                        <p class="title">Humidity</p>
                        <p class="mainContent" id="humidity"></p>
                    </div>
                    <div class="box">
                        <p class="title">Real Feel</p>
                        <p class="mainContent" id="realFeel"></p>
                    </div>
                    <div class="box">
                        <p class="title">UV Index</p>
                        <p class="mainContent" id="uvIndex"></p>
                    </div>
                    <div class="box">
                        <p class="title">Pressure</p>
                        <p class="mainContent" id="pressure"></p>
                    </div>
                    <div class="box">
                        <p class="title">Wind Gust</p>
                        <p class="mainContent" id="windGust"></p>
                    </div>
                    <div class="box">
                        <p class="title">Visibility</p>
                        <p class="mainContent" id="visCard"></p>
                    </div>
                    <div class="box">
                        <p class="title">Cloud Cover</p>
                        <p class="mainContent" id="cloudCard"></p>
                    </div>
                    <div class="box">
                        <p class="title">Precipitation</p>
                        <p class="mainContent" id="precepcard"></p>
                    </div>
                </div>
            </div>
        </div>
        <p style="display:none;">
            weather app, live weather, check temperature, weather by city, online weather tool
        </p>
    </main>
    <script src="script.js"></script>
</body>

</html>
